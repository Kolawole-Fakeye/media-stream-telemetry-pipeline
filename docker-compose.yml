version: '3.8'

services:
  # --- SERVICE 1: THE DATA API ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

  # --- SERVICE 2: THE VISUAL INTERFACE ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - backend
    environment:
      - BACKEND_API_URL=http://backend:8000
